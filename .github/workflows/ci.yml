name: CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test-nginx:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Vérification des fichiers essentiels
        run: |
          test -f Dockerfile || exit 1
          test -f nginx.conf || exit 1
          test -f index.html || exit 1

      - name: Build image Docker
        run: docker build -t nginx-test .

      - name: Validation configuration nginx
        run: docker run --rm nginx-test nginx -t

      - name: Démarrage du conteneur
        run: |
          docker run -d \
            --name nginx-container \
            -p 8080:80 \
            nginx-test

      - name: Attente démarrage
        run: sleep 5

      - name: Test HTTP
        run: |
          curl -f http://localhost:8080

      - name: Test endpoint health
        run: |
          curl -f http://localhost:8080/health

      - name: Affichage logs en cas d'échec
        if: failure()
        run: docker logs nginx-container